name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hms_test
          POSTGRES_PASSWORD: hms_test
          POSTGRES_DB: hms_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U hms_test -d hms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint:ci

      - name: Typecheck
        run: npm run typecheck

      # envs.ts valida las vars de entorno en import-time (Joi), así que hasta los tests unitarios
      # (que mockean Prisma y nunca pegan a la DB de verdad) necesitan que existan PORT, SECRET_JWT, etc.
      - name: Unit tests
        run: npx dotenv -e .env.test -- npm run test:unit -- --ci --coverage

      # test:e2e apunta a localhost:55432 vía .env.test — el mismo puerto que expone el
      # service container de arriba, así que es el mismo comando que se corre en local.
      - name: E2E tests
        run: npm run test:e2e

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
